<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Tập Phân Loại Màu Sắc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e0f2fe, #f0f9ff);
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .ball {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 10;
            transition: transform 0.1s ease;
        }
        .ball:active {
            cursor: grabbing;
            transform: scale(1.25);
        }
        #baskets-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            align-items: flex-end;
        }
        .basket {
            flex: 1;
            max-width: 240px;
            height: 280px;
            margin: 0 10px;
            border-radius: 20px 20px 60% 60%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 30px;
            border: 10px solid rgba(255,255,255,0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .basket-label {
            font-weight: 900;
            color: white;
            font-size: 1.8rem;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
            margin-top: 15px;
        }
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 50;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-20px) rotate(-8deg); }
            75% { transform: translateX(20px) rotate(8deg); }
        }
        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes basket-bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) translateY(-20px); }
            100% { transform: scale(1); }
        }
        .color-option {
            cursor: pointer;
            transition: all 0.2s;
            border: 6px solid transparent;
            padding: 1.5rem;
            border-radius: 2.5rem;
        }
        .color-option.selected {
            border-color: #3b82f6;
            transform: scale(1.1);
            background-color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="absolute top-6 left-6 z-20 bg-white/95 px-8 py-4 rounded-full shadow-2xl flex items-center gap-4 border-2 border-blue-300">
        <div class="text-4xl font-black text-blue-600">ĐIỂM: <span id="score">0</span></div>
    </div>

    <!-- Nút quay lại trang chủ -->
    <a href="../index.html" class="absolute top-6 right-6 z-20 bg-gray-200/95 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-full shadow-lg transition-all duration-200 text-2xl">
        🏠 Trang chủ
    </a>

    <div class="absolute bottom-0 w-full h-80 bg-green-300/30 -z-10 rounded-t-[200px]"></div>
    <div class="absolute top-12 right-12 text-8xl animate-bounce-slow opacity-60">☀️</div>
    <div class="absolute top-24 left-24 text-6xl animate-bounce-slow opacity-40" style="animation-delay: 1s;">☁️</div>

    <div id="baskets-container"></div>

    <div id="overlay" class="absolute inset-0 bg-white/98 z-50 flex items-center justify-center flex-col p-8 text-center">
        <div class="text-9xl mb-8">🎨</div>
        <h1 class="text-6xl font-black text-blue-600 mb-6">BÉ CHỌN MÀU SẮC</h1>
        <p class="text-3xl text-gray-500 mb-10">Bé chọn những màu mình thích nhé!</p>
        
        <div id="color-selector" class="flex flex-wrap justify-center gap-8 mb-16">
            <div class="color-option selected bg-red-50" data-color="red">
                <div class="w-20 h-20 rounded-full bg-red-500 mb-4 mx-auto shadow-lg"></div>
                <span class="text-2xl font-bold text-red-600">Màu Đỏ</span>
            </div>
            <div class="color-option selected bg-blue-50" data-color="blue">
                <div class="w-20 h-20 rounded-full bg-blue-500 mb-4 mx-auto shadow-lg"></div>
                <span class="text-2xl font-bold text-blue-600">Màu Xanh</span>
            </div>
            <div class="color-option bg-green-50" data-color="green">
                <div class="w-20 h-20 rounded-full bg-green-500 mb-4 mx-auto shadow-lg"></div>
                <span class="text-2xl font-bold text-green-600">Màu Lục</span>
            </div>
            <div class="color-option bg-yellow-50" data-color="yellow">
                <div class="w-20 h-20 rounded-full bg-yellow-400 mb-4 mx-auto shadow-lg"></div>
                <span class="text-2xl font-bold text-yellow-600">Màu Vàng</span>
            </div>
        </div>

        <button id="start-btn" class="bg-yellow-400 hover:bg-yellow-500 text-white font-black py-8 px-20 rounded-full text-4xl shadow-2xl transform transition active:scale-95 border-b-[12px] border-yellow-600">
            CHƠI LUÔN!
        </button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const basketsContainer = document.getElementById('baskets-container');
    const scoreElement = document.getElementById('score');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const colorOptions = document.querySelectorAll('.color-option');

    let score = 0;
    let gameActive = false;
    let activeColors = [];

    const allColors = {
        red: { name: 'red', hex: '#ef4444', label: '🍎', text: 'Màu đỏ' },
        blue: { name: 'blue', hex: '#3b82f6', label: '💧', text: 'Màu xanh' },
        green: { name: 'green', hex: '#22c55e', label: '🍏', text: 'Màu lục' },
        yellow: { name: 'yellow', hex: '#facc15', label: '⭐', text: 'Màu vàng' }
    };

    colorOptions.forEach(option => {
        option.addEventListener('click', () => {
            const selectedCount = document.querySelectorAll('.color-option.selected').length;
            if (option.classList.contains('selected')) {
                if (selectedCount > 2) option.classList.remove('selected');
            } else {
                if (selectedCount < 4) option.classList.add('selected');
            }
        });
    });

    function createFirework(x, y, color) {
        const particleCount = 50;
        const shapes = ['✨', '⭐', '🎈', '❤️', '🌈'];
        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const isEmoji = Math.random() > 0.4;
            if (isEmoji) {
                p.innerText = shapes[Math.floor(Math.random() * shapes.length)];
                p.style.fontSize = (Math.random() * 35 + 15) + 'px';
            } else {
                p.style.width = (Math.random() * 25 + 10) + 'px';
                p.style.height = p.style.width;
                p.style.borderRadius = '50%';
                p.style.backgroundColor = color;
            }
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            container.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 22 + 8;
            let posX = x;
            let posY = y;
            let life = 1;

            const anim = () => {
                posX += Math.cos(angle) * velocity;
                posY += Math.sin(angle) * velocity + (1 - life) * 18;
                life -= 0.01;
                p.style.left = posX + 'px';
                p.style.top = posY + 'px';
                p.style.opacity = life;
                p.style.transform = `scale(${life}) rotate(${posX}deg)`;
                if (life > 0) requestAnimationFrame(anim);
                else p.remove();
            };
            requestAnimationFrame(anim);
        }
    }

    function initBaskets() {
        basketsContainer.innerHTML = '';
        activeColors.forEach(colorKey => {
            const colorData = allColors[colorKey];
            const basket = document.createElement('div');
            basket.className = 'basket';
            basket.id = `basket-${colorKey}`;
            basket.style.backgroundColor = colorData.hex;
            basket.dataset.color = colorKey;
            basket.innerHTML = `
                <div class="text-8xl mb-6">🧺</div>
                <div class="basket-label uppercase">${colorData.text}</div>
            `;
            basketsContainer.appendChild(basket);
        });
    }

    function createBall() {
        if (!gameActive) return;

        const colorKey = activeColors[Math.floor(Math.random() * activeColors.length)];
        const colorObj = allColors[colorKey];
        const ball = document.createElement('div');
        ball.className = 'ball';
        ball.style.backgroundColor = colorObj.hex;
        ball.innerHTML = `<span class="text-6xl select-none">${colorObj.label}</span>`;
        ball.dataset.color = colorKey;
        
        const startX = Math.random() * (window.innerWidth - 180) + 90;
        ball.style.left = startX + 'px';
        ball.style.top = '-150px';
        container.appendChild(ball);

        let posY = -150;
        let speed = 0.8 + (score / 40); 
        let isDragging = false;

        const fallInterval = setInterval(() => {
            if (!isDragging) {
                posY += speed;
                ball.style.top = posY + 'px';
                if (posY > window.innerHeight) {
                    clearInterval(fallInterval);
                    ball.remove();
                    if (gameActive) createBall();
                }
            }
        }, 16);

        const onStart = (e) => {
            isDragging = true;
            ball.style.zIndex = 100;
        };

        const onMove = (e) => {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            ball.style.left = (clientX - 55) + 'px';
            ball.style.top = (clientY - 55) + 'px';
        };

        const onEnd = () => {
            if (!isDragging) return;
            isDragging = false;
            ball.style.zIndex = 10;
            const rect = ball.getBoundingClientRect();
            const ballX = rect.left + rect.width / 2;
            const ballY = rect.top + rect.height / 2;

            let droppedInBasket = null;
            activeColors.forEach(ck => {
                const b = document.getElementById(`basket-${ck}`);
                if (b) {
                    const bRect = b.getBoundingClientRect();
                    if (ballX > bRect.left && ballX < bRect.right && ballY > bRect.top && ballY < bRect.bottom) {
                        droppedInBasket = ck;
                    }
                }
            });

            if (droppedInBasket) {
                handleDrop(ball, droppedInBasket);
            } else {
                posY = rect.top;
            }
        };

        function handleDrop(ballEl, basketColor) {
            const ballColor = ballEl.dataset.color;
            if (ballColor === basketColor) {
                score++;
                scoreElement.innerText = score;
                createFirework(ballEl.offsetLeft + ballEl.offsetWidth / 2, ballEl.offsetTop + ballEl.offsetHeight / 2, ballEl.style.backgroundColor);
                
                // Hiệu ứng rổ nảy lên
                const targetBasket = document.getElementById(`basket-${basketColor}`);
                targetBasket.classList.add('basket-bounce');
                setTimeout(() => targetBasket.classList.remove('basket-bounce'), 300);

                clearInterval(fallInterval);
                ballEl.remove();
                createBall();
            } else {
                ballEl.classList.add('shake-animation');
                setTimeout(() => ballEl.classList.remove('shake-animation'), 400);
                
                const jumpHeight = 350; // Tăng chiều cao bật ngược
                posY = parseInt(ballEl.style.top) - jumpHeight;
                ballEl.style.top = posY + 'px';
                ballEl.style.left = (parseInt(ballEl.style.left) + (parseInt(ballEl.style.left) > window.innerWidth/2 ? -150 : 150)) + 'px';
            }
        }

        ball.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);
        ball.addEventListener('touchstart', onStart, {passive: false});
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('touchend', onEnd);
    }

    startBtn.addEventListener('click', () => {
        const selectedOptions = document.querySelectorAll('.color-option.selected');
        activeColors = Array.from(selectedOptions).map(opt => opt.dataset.color);
        overlay.style.display = 'none';
        gameActive = true;
        score = 0;
        scoreElement.innerText = score;
        initBaskets();
        createBall();
    });

    document.addEventListener('touchmove', (e) => e.preventDefault(), {passive: false});
</script>
</body>
</html>
