<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Tập Phân Loại Màu Sắc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e0f2fe, #f0f9ff);
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .ball {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
            z-index: 10;
            transition: transform 0.1s ease;
        }
        .ball:active {
            cursor: grabbing;
            transform: scale(1.2);
        }
        #baskets-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
        }
        .basket {
            width: 140px;
            height: 120px;
            border-radius: 20px 20px 50% 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
            border: 5px solid rgba(255,255,255,0.6);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .basket-label {
            font-weight: 900;
            color: white;
            font-size: 1.1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            pointer-events: none;
            text-align: center;
        }
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 50;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-5deg); }
            75% { transform: translateX(15px) rotate(5deg); }
        }
        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }
        /* Color selector styles */
        .color-option {
            cursor: pointer;
            transition: all 0.2s;
            border: 4px solid transparent;
        }
        .color-option.selected {
            border-color: #3b82f6;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- UI -->
    <div class="absolute top-6 left-6 z-20 bg-white/90 px-6 py-3 rounded-full shadow-lg flex items-center gap-4 border-2 border-blue-200">
        <div class="text-2xl font-black text-blue-600">ĐIỂM: <span id="score">0</span></div>
    </div>

    <!-- Nền trang trí -->
    <div class="absolute bottom-0 w-full h-40 bg-green-200/40 -z-10 rounded-t-[100px]"></div>
    <div class="absolute top-12 right-12 text-6xl animate-bounce-slow opacity-60">☀️</div>
    <div class="absolute top-24 left-24 text-4xl animate-bounce-slow opacity-40" style="animation-delay: 1s;">☁️</div>

    <!-- Container chứa rổ bóng sẽ được gen bằng JS -->
    <div id="baskets-container"></div>

    <!-- Màn hình bắt đầu & Chọn màu -->
    <div id="overlay" class="absolute inset-0 bg-white/95 z-50 flex items-center justify-center flex-col p-8 text-center">
        <div class="text-7xl mb-4">🎨</div>
        <h1 class="text-4xl font-black text-blue-600 mb-2">BÉ CHỌN MÀU SẮC</h1>
        <p class="text-xl text-gray-500 mb-6">Bé muốn chơi với mấy màu? (Chọn 2 đến 4 màu)</p>
        
        <!-- Thanh chọn màu -->
        <div id="color-selector" class="flex gap-4 mb-10">
            <div class="color-option selected p-4 rounded-2xl bg-red-100" data-color="red">
                <div class="w-12 h-12 rounded-full bg-red-500 mb-2 mx-auto"></div>
                <span class="font-bold text-red-600">Đỏ</span>
            </div>
            <div class="color-option selected p-4 rounded-2xl bg-blue-100" data-color="blue">
                <div class="w-12 h-12 rounded-full bg-blue-500 mb-2 mx-auto"></div>
                <span class="font-bold text-blue-600">Xanh</span>
            </div>
            <div class="color-option p-4 rounded-2xl bg-green-100" data-color="green">
                <div class="w-12 h-12 rounded-full bg-green-500 mb-2 mx-auto"></div>
                <span class="font-bold text-green-600">Lục</span>
            </div>
            <div class="color-option p-4 rounded-2xl bg-yellow-100" data-color="yellow">
                <div class="w-12 h-12 rounded-full bg-yellow-400 mb-2 mx-auto"></div>
                <span class="font-bold text-yellow-600">Vàng</span>
            </div>
        </div>

        <button id="start-btn" class="bg-yellow-400 hover:bg-yellow-500 text-white font-black py-5 px-14 rounded-full text-2xl shadow-2xl transform transition active:scale-90 border-b-8 border-yellow-600">
            BẮT ĐẦU CHƠI
        </button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const basketsContainer = document.getElementById('baskets-container');
    const scoreElement = document.getElementById('score');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const colorOptions = document.querySelectorAll('.color-option');

    let score = 0;
    let gameActive = false;
    let activeColors = [];

    const allColors = {
        red: { name: 'red', hex: '#ef4444', label: '🍎', text: 'ĐỎ' },
        blue: { name: 'blue', hex: '#3b82f6', label: '💧', text: 'XANH' },
        green: { name: 'green', hex: '#22c55e', label: '🍏', text: 'LỤC' },
        yellow: { name: 'yellow', hex: '#facc15', label: '⭐', text: 'VÀNG' }
    };

    // Xử lý chọn màu trên thanh menu
    colorOptions.forEach(option => {
        option.addEventListener('click', () => {
            const selectedCount = document.querySelectorAll('.color-option.selected').length;
            if (option.classList.contains('selected')) {
                if (selectedCount > 2) {
                    option.classList.remove('selected');
                }
            } else {
                if (selectedCount < 4) {
                    option.classList.add('selected');
                }
            }
        });
    });

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, duration, type = 'sine', volume = 0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playSuccess() {
        playTone(523.25, 0.15); // C5
        setTimeout(() => playTone(659.25, 0.15), 100); // E5
        setTimeout(() => playTone(783.99, 0.3), 200); // G5
    }

    function playFail() {
        playTone(200, 0.2, 'triangle', 0.2);
    }

    function createFirework(x, y, color) {
        const particleCount = 35;
        const shapes = ['✨', '⭐', '🎈', '●'];
        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const isEmoji = Math.random() > 0.4;
            if (isEmoji) {
                p.innerText = shapes[Math.floor(Math.random() * shapes.length)];
                p.style.fontSize = (Math.random() * 25 + 10) + 'px';
            } else {
                p.style.width = (Math.random() * 15 + 5) + 'px';
                p.style.height = p.style.width;
                p.style.borderRadius = '50%';
                p.style.backgroundColor = color;
            }
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            container.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 15 + 5;
            let posX = x;
            let posY = y;
            let life = 1;

            const anim = () => {
                posX += Math.cos(angle) * velocity;
                posY += Math.sin(angle) * velocity + (1 - life) * 12;
                life -= 0.015;
                p.style.left = posX + 'px';
                p.style.top = posY + 'px';
                p.style.opacity = life;
                p.style.transform = `scale(${life}) rotate(${posX}deg)`;
                if (life > 0) requestAnimationFrame(anim);
                else p.remove();
            };
            requestAnimationFrame(anim);
        }
    }

    function initBaskets() {
        basketsContainer.innerHTML = '';
        activeColors.forEach(colorKey => {
            const colorData = allColors[colorKey];
            const basket = document.createElement('div');
            basket.className = 'basket';
            basket.id = `basket-${colorKey}`;
            basket.style.backgroundColor = colorData.hex;
            basket.dataset.color = colorKey;
            basket.innerHTML = `
                <div class="basket-label uppercase">${colorData.text}</div>
                <div class="text-5xl mb-2">🧺</div>
            `;
            basketsContainer.appendChild(basket);
        });
    }

    function createBall() {
        if (!gameActive) return;

        const colorKey = activeColors[Math.floor(Math.random() * activeColors.length)];
        const colorObj = allColors[colorKey];
        const ball = document.createElement('div');
        ball.className = 'ball';
        ball.style.backgroundColor = colorObj.hex;
        ball.innerHTML = `<span class="text-4xl select-none">${colorObj.label}</span>`;
        ball.dataset.color = colorKey;
        
        const startX = Math.random() * (window.innerWidth - 120) + 60;
        ball.style.left = startX + 'px';
        ball.style.top = '-120px';
        container.appendChild(ball);

        let posY = -120;
        let speed = 1.0 + (score / 30); 
        let isDragging = false;

        const fallInterval = setInterval(() => {
            if (!isDragging) {
                posY += speed;
                ball.style.top = posY + 'px';
                if (posY > window.innerHeight) {
                    clearInterval(fallInterval);
                    ball.remove();
                    if (gameActive) createBall();
                }
            }
        }, 16);

        const onStart = (e) => {
            isDragging = true;
            ball.style.zIndex = 100;
        };

        const onMove = (e) => {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            ball.style.left = (clientX - 40) + 'px';
            ball.style.top = (clientY - 40) + 'px';
        };

        const onEnd = () => {
            if (!isDragging) return;
            isDragging = false;
            ball.style.zIndex = 10;
            
            const rect = ball.getBoundingClientRect();
            const ballX = rect.left + rect.width / 2;
            const ballY = rect.top + rect.height / 2;

            let droppedInBasket = null;
            activeColors.forEach(ck => {
                const b = document.getElementById(`basket-${ck}`);
                const bRect = b.getBoundingClientRect();
                if (ballX > bRect.left && ballX < bRect.right && ballY > bRect.top && ballY < bRect.bottom) {
                    droppedInBasket = ck;
                }
            });

            if (droppedInBasket) {
                handleDrop(ball, droppedInBasket);
            } else {
                posY = rect.top;
            }
        };

        function handleDrop(ballEl, basketColor) {
            if (ballEl.dataset.color === basketColor) {
                score++;
                scoreElement.innerText = score;
                playSuccess();
                createFirework(parseInt(ballEl.style.left) + 40, parseInt(ballEl.style.top) + 40, ballEl.style.backgroundColor);
                
                const targetBasket = document.getElementById(`basket-${basketColor}`);
                targetBasket.style.transform = 'scale(1.25) translateY(-10px)';
                setTimeout(() => targetBasket.style.transform = 'scale(1)', 300);

                clearInterval(fallInterval);
                ballEl.remove();
                createBall();
            } else {
                playFail();
                ballEl.classList.add('shake-animation');
                setTimeout(() => ballEl.classList.remove('shake-animation'), 400);
                
                // Bật ngược lên cao
                const jumpHeight = 180;
                posY = parseInt(ballEl.style.top) - jumpHeight;
                ballEl.style.top = posY + 'px';
                ballEl.style.left = (parseInt(ballEl.style.left) + (parseInt(ballEl.style.left) > window.innerWidth/2 ? -80 : 80)) + 'px';
            }
        }

        ball.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);
        ball.addEventListener('touchstart', onStart, {passive: false});
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('touchend', onEnd);
    }

    startBtn.addEventListener('click', () => {
        const selectedOptions = document.querySelectorAll('.color-option.selected');
        activeColors = Array.from(selectedOptions).map(opt => opt.dataset.color);
        
        if (audioCtx.state === 'suspended') audioCtx.resume();
        overlay.style.display = 'none';
        gameActive = true;
        score = 0;
        scoreElement.innerText = score;
        
        initBaskets();
        createBall();
    });

    document.addEventListener('touchmove', (e) => e.preventDefault(), {passive: false});
</script>
</body>
</html>
